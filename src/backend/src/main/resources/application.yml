server:
  port: ${PORT:443}
  http-port: ${HTTP_PORT:80}
  internal-port: ${INTERNAL_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:false}
    certificate: ${SSL_CERT:/certs/cert.pem}
    certificate-private-key: ${SSL_KEY:/certs/privkey.pem}

spring:
  application:
    name: opengovsupport-backend
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_empty
    serialization:
      indent_output: ${JSON_INDENT:false}

opengov:
  pool:
    workers: ${POOL_WORKERS:0}            # 0 = Runtime.availableProcessors()
    queue: ${POOL_QUEUE:1024}
    fast-threshold: ${POOL_FAST_THRESHOLD:4096}
  coalescer:
    enabled: true
    shards: 32
  frontend-url: ${FRONTEND_URL:http://frontend:3000}

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{0} - %msg%n"
