name: package

# 뜌땨 생활행정 — 데스크톱 매트릭스 빌드 + 누락 릴리스 자동 백필.
#
#   ▣ 트리거: 모든 푸시 (main / dev) + 수동 + 태그 푸시.
#   ▣ scan : git tag 'v*' 를 모두 훑어 GitHub Release 가 없는 태그를 추출.
#            누락 태그가 0 개면 매트릭스 잡 실행하지 않음.
#   ▣ build: (tag × OS) 매트릭스 — 각 태그를 checkout 한 뒤 패키지 빌드.
#   ▣ release: 태그별 산출물을 모아 Draft Release 생성/갱신.
#
#   각 OS 잡은 진짜 그 OS 의 VM 에서 동작:
#     - Windows: GitHub-hosted windows-latest (Azure Windows Server VM)
#     - macOS:   GitHub-hosted macos-13 (x64) + macos-14 (arm64) 실 VM
#     - Linux:   GitHub-hosted ubuntu-22.04 VM
#
#   FreeBSD 빌드는 vmactions VM 안정성 문제로 제거됨 (추후 재도입 예정).
#
#   Mode A (Docker compose) 는 본 워크플로우의 영향을 전혀 받지 않습니다.

on:
  push:
    branches: [main, dev]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      force_tag:
        description: "특정 태그를 강제 빌드 (예: v0.2.0). 빈 값이면 누락 태그 자동 검색."
        required: false
        type: string

permissions:
  contents: write    # release 작성 + 자산 업로드
  actions: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    name: scan tags missing releases
    runs-on: ubuntu-22.04
    outputs:
      tags_json: ${{ steps.find.outputs.tags_json }}
      tag_count: ${{ steps.find.outputs.tag_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 모든 태그 필요
      - name: install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: find tags missing release
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_TAG: ${{ github.event.inputs.force_tag }}
        run: |
          set -euo pipefail

          # 강제 태그 모드 — 사용자가 dispatch input 으로 지정한 단일 태그만 빌드.
          if [ -n "${FORCE_TAG:-}" ]; then
            if ! git rev-parse "${FORCE_TAG}" >/dev/null 2>&1; then
              echo "::error::요청 태그가 존재하지 않습니다: ${FORCE_TAG}"
              exit 1
            fi
            echo "force mode: ${FORCE_TAG}"
            echo "tags_json=[\"${FORCE_TAG}\"]" >> "$GITHUB_OUTPUT"
            echo "tag_count=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 태그 푸시면 그 태그만.
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            t="${GITHUB_REF_NAME}"
            echo "tag push: ${t}"
            if gh release view "${t}" --json tagName -q .tagName >/dev/null 2>&1; then
              echo "release already exists for ${t} — nothing to do"
              echo "tags_json=[]" >> "$GITHUB_OUTPUT"
              echo "tag_count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "tags_json=[\"${t}\"]" >> "$GITHUB_OUTPUT"
            echo "tag_count=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 일반 푸시 — 모든 'v*' 태그를 훑어 release 가 없는 것만 추출.
          all_tags=$(git tag -l 'v*' | sort -V || true)
          missing=()
          for t in $all_tags; do
            if gh release view "$t" --json tagName -q .tagName >/dev/null 2>&1; then
              echo "skip: $t  (release exists)"
            else
              echo "miss: $t"
              missing+=("$t")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "no missing-release tags — packaging skipped"
            echo "tags_json=[]" >> "$GITHUB_OUTPUT"
            echo "tag_count=0" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${missing[@]}" | jq -R . | jq -sc .)
            echo "missing tags: $json"
            echo "tags_json=$json" >> "$GITHUB_OUTPUT"
            echo "tag_count=${#missing[@]}" >> "$GITHUB_OUTPUT"
          fi

  windows:
    name: windows · ${{ matrix.tag }}
    needs: scan
    if: needs.scan.outputs.tag_count != '0'
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.scan.outputs.tags_json) }}
    # GitHub-hosted Windows Server VM (실 Azure VM, 컨테이너 아님).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: backend jar
        shell: bash
        run: cd src/backend && mvn -B -DskipTests package
      - name: frontend build
        shell: bash
        run: |
          cd src/frontend
          npm ci --no-audit --no-fund
          npm run build
      - name: desktop install
        shell: bash
        working-directory: desktop
        run: npm ci --no-audit --no-fund
      - name: prepare resources + jlink
        shell: bash
        working-directory: desktop
        run: |
          npm run prepare:resources
          npm run prepare:jre
      - name: electron-builder (win)
        shell: bash
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run package:win
      - uses: actions/upload-artifact@v4
        with:
          name: tyutya-${{ matrix.tag }}-windows
          path: desktop/out/*.exe
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macos-${{ matrix.runner }} · ${{ matrix.tag }}
    needs: scan
    if: needs.scan.outputs.tag_count != '0'
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.scan.outputs.tags_json) }}
        # macos-13 = Intel x64 VM, macos-14 = Apple Silicon VM (모두 실 VM).
        runner: [macos-13, macos-14]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: backend jar
        run: cd src/backend && mvn -B -DskipTests package
      - name: frontend build
        run: |
          cd src/frontend
          npm ci --no-audit --no-fund
          npm run build
      - name: desktop install
        working-directory: desktop
        run: npm ci --no-audit --no-fund
      - name: prepare resources + jlink
        working-directory: desktop
        run: |
          npm run prepare:resources
          npm run prepare:jre
      - name: electron-builder (mac)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # 시크릿이 비어 있을 경우 GitHub Actions 는 env 를 빈 문자열로 주입한다.
        # electron-builder 는 빈 CSC_LINK 를 cwd 에 resolve 해 "desktop not a file" 으로 죽으므로
        # 시크릿이 없으면 CSC_* 를 통째로 unset 하고 keychain 자동 탐지도 끈 뒤 unsigned 빌드 진행.
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "::notice::MAC_CSC_LINK 미설정 — unsigned 빌드 진행 (배포본은 Gatekeeper 경고 가능)."
          fi
          # DMG 빌드는 간헐적으로 hdiutil 오류(mount 실패)나 인코딩 문제로 실패할 수 있음.
          # 실패 시 ZIP 빌드로 fallback 하여 최소한의 실행 파일은 제공하도록 함.
          npm run package:mac || {
            echo "::warning::DMG packaging failed. Falling back to ZIP-only build."
            npx electron-builder --mac zip --publish never
          }
      - uses: actions/upload-artifact@v4
        with:
          name: tyutya-${{ matrix.tag }}-${{ matrix.runner }}
          path: |
            desktop/out/*.dmg
            desktop/out/*.zip
          if-no-files-found: error
          retention-days: 14

  linux:
    name: linux · ${{ matrix.tag }}
    needs: scan
    if: needs.scan.outputs.tag_count != '0'
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.scan.outputs.tags_json) }}
    # GitHub-hosted Ubuntu VM (실 VM).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: AppImage tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fuse libfuse2 desktop-file-utils
      - name: backend jar
        run: cd src/backend && mvn -B -DskipTests package
      - name: frontend build
        run: |
          cd src/frontend
          npm ci --no-audit --no-fund
          npm run build
      - name: desktop install
        working-directory: desktop
        run: npm ci --no-audit --no-fund
      - name: prepare resources + jlink
        working-directory: desktop
        run: |
          npm run prepare:resources
          npm run prepare:jre
      - name: electron-builder (linux)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: "false"
        run: npm run package:linux
      - uses: actions/upload-artifact@v4
        with:
          name: tyutya-${{ matrix.tag }}-linux
          path: desktop/out/*.AppImage
          if-no-files-found: error
          retention-days: 14

  release:
    name: release · ${{ matrix.tag }}
    needs: [scan, windows, macos, linux]
    if: needs.scan.outputs.tag_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        tag: ${{ fromJson(needs.scan.outputs.tags_json) }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 0
      - name: download artifacts for ${{ matrix.tag }}
        uses: actions/download-artifact@v4
        with:
          pattern: tyutya-${{ matrix.tag }}-*
          merge-multiple: true
          path: artifacts
      - name: list artifacts
        run: |
          mkdir -p artifacts
          find artifacts -type f -printf '%p (%s bytes)\n' || true
      - name: release notes
        id: notes
        run: |
          {
            echo 'notes<<EOF'
            echo "## 뜌땨 생활행정 ${{ matrix.tag }}"
            echo ""
            echo "결정적 산식 기반 세무·복지 계산 데스크톱 앱."
            echo ""
            echo "### 다운로드"
            echo ""
            echo "- Windows: \`Tyutya-Setup-*.exe\` — 더블클릭 → 설치"
            echo "- macOS (Intel): \`Tyutya-*-x64.dmg\` (또는 \`.zip\`) — DMG 열기 → Applications 드롭"
            echo "- macOS (Apple Silicon): \`Tyutya-*-arm64.dmg\` (또는 \`.zip\`) — 동일"
            echo "- Linux: \`Tyutya-*.AppImage\` — 더블클릭 → 자동 설치 마법사 (chmod 불필요)"
            echo ""
            echo "### 면책"
            echo ""
            echo "본 산출은 공개 법령의 산식을 결정적으로 평가한 참고 자료이며 신고·납부·수급의 효력을 갖지 않습니다."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: 뜌땨 생활행정 ${{ matrix.tag }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(matrix.tag, '-') }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
          fail_on_unmatched_files: false
