# Single-host stack: Spring Boot 4.0.2 (Java 21) backend + Next.js frontend + nginx HTTPS proxy.
#
#   docker compose up --build              # foreground
#   docker compose up -d --build           # detached
#   docker compose logs -f backend         # tail one service
#   docker compose down                    # stop & remove
#
# HTTPS setup (nginx):
#   Place your TLS certificate files in the directory pointed to by CERTS_DIR (.env):
#     ${CERTS_DIR}/fullchain.pem   — certificate chain
#     ${CERTS_DIR}/privkey.pem     — private key
#   Access the app at https://<host>  (port 443 by default, see HTTPS_PORT in .env).
#   HTTP requests on port 80 are permanently redirected to HTTPS.
#
# Direct backend access (no TLS): http://localhost:31777  (e.g. /api/runtime/stats).

name: opengovsupport

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    image: opengovsupport-backend:latest
    container_name: opengovsupport-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      # — runtime tuning (see src/backend/src/main/java/.../runtime/) —
      POOL_WORKERS: "${POOL_WORKERS:-8}"
      POOL_QUEUE: "${POOL_QUEUE:-4096}"
      POOL_FAST_THRESHOLD: "${POOL_FAST_THRESHOLD:-4096}"
      JSON_INDENT: "${JSON_INDENT:-false}"
      JAVA_OPTS: "${JAVA_OPTS:--XX:+UseG1GC -XX:MaxRAMPercentage=75}"
    ports:
      - "${BACKEND_PORT:-31777}:8080"
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPUS:-2.0}"
          memory: "${BACKEND_MEMORY:-1024M}"

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    image: opengovsupport-frontend:latest
    container_name: opengovsupport-frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      BACKEND_URL: "http://backend:8080"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPUS:-1.0}"
          memory: "${FRONTEND_MEMORY:-512M}"

  nginx:
    image: nginx:1.27-alpine
    container_name: opengovsupport-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${CERTS_DIR:-./certs}:/etc/nginx/certs:ro
    depends_on:
      - frontend
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && wget -qO- http://localhost:80/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app:
    driver: bridge
